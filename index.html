<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>ESP32 參數控制器 + MQTT</title>
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body>
  <h2>ESP32 參數控制器</h2>

  <label>Powertype:
    <select id="powertype">
      <option value="[0,0,0,1]">auto</option>
      <option value="[0,1,0,0]">low</option>
    </select>
  </label>
  <br>
  <label>Temperature:
    <select id="temperature">
      <option value="[0,0,0,0]">17°C</option>
      <option value="[0,0,0,1]">18°C</option>
    </select>
  </label>
  <br>
  <button id="sendBtn" disabled>送出設定資料</button>

  <script>
    // 建立 MQTT client
    const client = mqtt.connect("ws://broker.hivemq.com:8000/mqtt");

    client.on("connect", () => {
      console.log("已連線到 HiveMQ Broker");
      document.getElementById("sendBtn").disabled = false; // 連線完成才允許送出
    });

    document.getElementById("sendBtn").addEventListener("click", () => {
      const payload = {
        powertype: document.getElementById("powertype").value,
        temperature: document.getElementById("temperature").value
      };
      const message = JSON.stringify(payload);

      client.publish("esp32/control", message, {}, (err) => {
        if (err) {
          console.error("Publish 失敗:", err);
        } else {
          console.log("已送出:", message);
          alert("已送出設定: " + message);
        }
      });
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESP32 參數控制器</title>

  <!-- 引入 MQTT.js -->
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
</head>
<body>
  <div class="container">
    <h2>ESP32 參數控制器</h2>
    <form id="controlForm">
      <!-- Powertype -->
      <div class="card">
        <h3>1. 電源類型 (Powertype)</h3>
        <select name="powertype">
          <option value="[0,0,0,1]">auto (自動)</option>
          <option value="[0,1,0,0]">low (低)</option>
          <option value="[0,0,1,0]">med (中)</option>
          <option value="[0,0,0,0]">high (高)</option>
          <option value="[0,0,0,1,0,1,1,1,1,1,1,0]">shutdown (關機)</option>
        </select>
      </div>

      <!-- Temperature -->
      <div class="card">
        <h3>2. 溫度設定 (Temperature)</h3>
        <select name="temperature">
          <option value="[0,0,0,0]">17 °C</option>
          <option value="[0,0,0,1]">18 °C</option>
          <option value="[0,0,1,1]">19 °C</option>
          <option value="[0,0,1,0]">20 °C</option>
          <option value="[0,1,1,0]">21 °C</option>
          <option value="[0,1,1,1]">22 °C</option>
          <option value="[0,1,0,1]">23 °C</option>
          <option value="[0,1,0,0]">24 °C</option>
          <option value="[1,1,0,0]">25 °C</option>
          <option value="[1,1,0,1]">26 °C</option>
          <option value="[1,0,0,1]">27 °C</option>
          <option value="[1,0,0,0]">28 °C</option>
        </select>
      </div>

      <!-- Mode -->
      <div class="card">
        <h3>3. 運作模式 (Mode)</h3>
        <select name="mode">
          <option value="[0,0,0,0]">模式 0</option>
          <option value="[0,0,1,1]">模式 1</option>
          <option value="[0,1,0,0]">模式 2</option>
          <option value="[0,0,1,0]">模式 3</option>
          <option value="[1,0,0,0]">模式 4</option>
        </select>
      </div>

      <!-- Timer -->
      <div class="card">
        <h3>4. 定時器 (Timer)</h3>
        <select name="timer">
          <option value="[0,0,0,0,0,0]">0</option>
          <option value="[1,0,0,0,0,0]">1</option>
          <option value="[0,1,0,0,0,0]">2</option>
          <option value="[1,1,0,0,0,0]">3</option>
          <!-- 可依需求繼續擴充到 34 -->
        </select>
      </div>

      <button type="submit" class="btn-submit">送出設定資料</button>
    </form>
  </div>

</body>
</html>
